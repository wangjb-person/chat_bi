<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBi - 智能问数系统</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* ========== 侧边栏样式 ========== */
        .sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 2px 0 12px rgba(0,0,0,0.05);
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #1a73e8 0%, #0d5bbd 100%);
            color: white;
            text-align: center;
        }

        .sidebar-header h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 12px;
            opacity: 0.85;
        }

        .sidebar-section {
            padding: 16px 20px;
            border-bottom: 1px solid #eef2f6;
        }

        .sidebar-section h3 {
            font-size: 14px;
            color: #1e293b;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .sidebar-section input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
        }

        .sidebar-section input:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.1);
        }

        .btn-outline {
            width: 100%;
            padding: 8px;
            background: #eff6ff;
            color: #1a73e8;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            background: #dbeafe;
        }

        .training-list {
            max-height: 280px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .training-item {
            background: #f8fafc;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }

        .training-item:hover {
            background: #eff6ff;
            transform: translateX(3px);
            border-color: #bfdbfe;
        }

        .training-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 500;
            margin-right: 8px;
        }

        .type-sql { background: #dbeafe; color: #1e40af; }
        .type-ddl { background: #fed7aa; color: #9a3412; }
        .type-doc { background: #cffafe; color: #0e7490; }
        .type-gen { background: #e9d5ff; color: #6b21a5; }

        /* ========== 主内容区样式 ========== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f0f4f8;
        }

        .chat-header {
            background: white;
            padding: 12px 24px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 18px;
            color: #1e293b;
            font-weight: 600;
        }

        .status-badge {
            font-size: 12px;
            color: #059669;
            background: #d1fae5;
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* 消息区域 */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #1a73e8 0%, #0d5bbd 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }

        /* SQL 代码块 */
        .sql-block {
            background: #1e293b;
            color: #e2e8f0;
            padding: 12px 16px;
            border-radius: 10px;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
            margin: 10px 0;
        }

        /* 数据表格 */
        .data-table {
            overflow-x: auto;
            margin: 12px 0;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: white;
        }

        .data-table table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .data-table th {
            padding: 10px 12px;
            text-align: left;
            background: #f8fafc;
            font-weight: 600;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
        }

        .data-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        .data-table tr:hover td {
            background: #f8fafc;
        }

        /* 图表容器 */
        .plot-container {
            margin: 12px 0;
            background: white;
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #e2e8f0;
        }

        /* 后续问题按钮 */
        .followup-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .followup-btn {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            padding: 8px 18px;
            border-radius: 24px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #1a73e8;
        }

        .followup-btn:hover {
            background: #dbeafe;
            transform: translateY(-2px);
        }

        /* 输入区域 */
        .input-area {
            background: white;
            padding: 16px 24px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .input-area input:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.1);
        }

        .input-area button {
            padding: 12px 28px;
            background: linear-gradient(135deg, #1a73e8 0%, #0d5bbd 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .input-area button:hover {
            transform: scale(1.02);
            box-shadow: 0 2px 8px rgba(26,115,232,0.3);
        }

        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e2e8f0;
            border-top-color: #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            width: 520px;
            max-width: 90%;
            padding: 24px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
        }

        .modal-content h3 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #1e293b;
        }

        .modal-content select,
        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 10px 12px;
            margin: 8px 0;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 13px;
        }

        .modal-content textarea {
            resize: vertical;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-buttons button {
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-cancel {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            color: #475569;
        }

        .btn-confirm {
            background: #1a73e8;
            border: none;
            color: white;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* 执行状态 */
        .executing-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1a73e8;
            font-size: 13px;
            padding: 8px 12px;
            background: #eff6ff;
            border-radius: 10px;
            margin-top: 8px;
        }

        .result-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 11px;
            color: #475569;
            margin-bottom: 8px;
        }

        .result-badge .icon {
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🤖 ChatBi助手</h1>
                <p>智能问数平台</p>
            </div>

            <div class="sidebar-section">
                <h3>📊 选择数据表</h3>
                <input type="text" id="tableName" placeholder="输入表名（可选）">
            </div>

            <div class="sidebar-section">
                <h3>📚 训练数据管理</h3>
                <button class="btn-outline" onclick="showAddTrainingModal()">+ 添加训练数据</button>
                <div style="margin-top: 12px;">
                    <input type="text" id="searchKeyword" placeholder="搜索训练数据...">
                    <button class="btn-outline" onclick="searchTrainingData()" style="margin-top: 6px;">🔍 搜索</button>
                </div>
                <div id="trainingList" class="training-list">
                    <div style="color:#94a3b8; text-align:center; padding:20px;">暂无数据</div>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main">
            <div class="chat-header">
                <h2>💬 智能问数</h2>
                <div class="status-badge">● 就绪</div>
            </div>

            <div id="messages" class="messages">
                <div class="message assistant">
                    <div class="message-content">
                        👋 你好！我是华强AI助手。<br>
                        你可以直接输入自然语言问题，我会帮你生成SQL、执行查询并展示结果。<br>
                        <br>
                        📌 例如：<br>
                        • "查询股份公司和方特集团2023年12月合并报表资产总额"<br>
                        • "查询销售额最高的10个产品"
                    </div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="questionInput" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
                <button id="sendBtn" onclick="sendQuestion()">发送</button>
            </div>
        </div>
    </div>

    <!-- 添加训练数据模态框 -->
    <div id="trainingModal" class="modal">
        <div class="modal-content">
            <h3>添加训练数据</h3>
            <select id="trainType">
                <option value="sql">SQL 问答对</option>
                <option value="ddl">DDL 语句</option>
                <option value="doc">文档说明</option>
                <option value="gen">通用知识</option>
            </select>
            <div id="sqlFields">
                <input type="text" id="trainQuestion" placeholder="问题">
                <textarea id="trainSql" placeholder="SQL 语句" rows="3"></textarea>
            </div>
            <div id="ddlFields" style="display:none;">
                <textarea id="trainDdl" placeholder="DDL 语句" rows="3"></textarea>
            </div>
            <div id="docFields" style="display:none;">
                <textarea id="trainDoc" placeholder="文档内容" rows="3"></textarea>
            </div>
            <div id="genFields" style="display:none;">
                <textarea id="trainGen" placeholder="通用知识" rows="3"></textarea>
                <input type="text" id="trainGenType" placeholder="类型标签">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-confirm" onclick="addTrainingData()">添加</button>
            </div>
        </div>
    </div>

    <script>
        let currentMessageId = null;

        // 切换表单字段
        document.getElementById('trainType').addEventListener('change', function() {
            const type = this.value;
            document.getElementById('sqlFields').style.display = type === 'sql' ? 'block' : 'none';
            document.getElementById('ddlFields').style.display = type === 'ddl' ? 'block' : 'none';
            document.getElementById('docFields').style.display = type === 'doc' ? 'block' : 'none';
            document.getElementById('genFields').style.display = type === 'gen' ? 'block' : 'none';
        });

        function showAddTrainingModal() {
            document.getElementById('trainingModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('trainingModal').style.display = 'none';
        }

        async function addTrainingData() {
            const type = document.getElementById('trainType').value;
            const tableName = document.getElementById('tableName').value;
            let data = {};

            if (type === 'sql') {
                data = {
                    question: document.getElementById('trainQuestion').value,
                    sql: document.getElementById('trainSql').value,
                    table_name: tableName
                };
            } else if (type === 'ddl') {
                data = {
                    ddl: document.getElementById('trainDdl').value,
                    table_name: tableName
                };
            } else if (type === 'doc') {
                data = {
                    documentation: document.getElementById('trainDoc').value,
                    table_name: tableName
                };
            } else {
                data = {
                    general: document.getElementById('trainGen').value,
                    gen_type: document.getElementById('trainGenType').value
                };
            }

            try {
                const response = await fetch('/api/train', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.success) {
                    alert('添加成功！');
                    closeModal();
                    loadTrainingData();
                    // 清空表单
                    document.getElementById('trainQuestion').value = '';
                    document.getElementById('trainSql').value = '';
                    document.getElementById('trainDdl').value = '';
                    document.getElementById('trainDoc').value = '';
                    document.getElementById('trainGen').value = '';
                    document.getElementById('trainGenType').value = '';
                } else {
                    alert('添加失败: ' + result.error);
                }
            } catch (error) {
                alert('添加失败: ' + error.message);
            }
        }

        async function loadTrainingData() {
            try {
                const response = await fetch('/api/get_training_data?page=1&page_size=50');
                const data = await response.json();
                const container = document.getElementById('trainingList');
                if (data.data && data.data.length > 0) {
                    container.innerHTML = data.data.map(item => `
                        <div class="training-item" onclick="askQuestion('${escapeHtml(item.question || item.content || '').replace(/'/g, "\\'")}')">
                            <span class="training-type type-${item.type}">${item.type}</span>
                            <span style="font-size:11px; color:#64748b;">${item.id}</span>
                            <div style="margin-top:4px; font-size:12px; color:#334155; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                                ${item.question || (item.content ? item.content.substring(0, 50) : '')}
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div style="color:#94a3b8; text-align:center; padding:20px;">暂无训练数据</div>';
                }
            } catch (error) {
                console.error('加载训练数据失败:', error);
            }
        }

        async function searchTrainingData() {
            const keyword = document.getElementById('searchKeyword').value;
            try {
                const response = await fetch('/api/search_training_data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword })
                });
                const data = await response.json();
                const container = document.getElementById('trainingList');
                if (data.data && data.data.length > 0) {
                    container.innerHTML = data.data.map(item => `
                        <div class="training-item" onclick="askQuestion('${escapeHtml(item.content || '').replace(/'/g, "\\'")}')">
                            <span class="training-type type-${item.data_type}">${item.data_type}</span>
                            <span style="font-size:11px; color:#64748b;">${item.id}</span>
                            <div style="margin-top:4px; font-size:12px; color:#334155; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                                ${item.content ? item.content.substring(0, 50) : ''}
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div style="color:#94a3b8; text-align:center; padding:20px;">未找到结果</div>';
                }
            } catch (error) {
                console.error('搜索失败:', error);
            }
        }

        function askQuestion(question) {
            document.getElementById('questionInput').value = question;
            sendQuestion();
        }

        // 发送问题
        async function sendQuestion() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question) return;

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            input.disabled = true;

            addMessage('user', question);
            input.value = '';

            const loadingId = addLoadingMessage();

            const tableName = document.getElementById('tableName').value;
            const messages = [{ role: 'user', content: question }];

            let fullSql = '';
            let assistantMessageDiv = null;

            try {
                const response = await fetch('/api/generate_sql_stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages, table_name: tableName })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let sseBuffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    sseBuffer += decoder.decode(value || new Uint8Array(), { stream: !done });
                    const lines = sseBuffer.split('\n');
                    sseBuffer = lines.pop() || '';

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed.startsWith('data: ')) continue;
                        try {
                            const data = JSON.parse(trimmed.slice(6));
                            // 必须先判断 done：结束帧同时带 sql 与 done，若先判断 data.sql 会永远进不到执行分支
                            if (data.done) {
                                currentMessageId = data.id;
                                const sqlToRun = (data.sql && String(data.sql).trim()) || fullSql.trim();
                                if (assistantMessageDiv && sqlToRun) {
                                    updateAssistantMessage(assistantMessageDiv, sqlToRun);
                                }
                                if (sqlToRun) {
                                    await executeSqlWithStatus(data.id, sqlToRun);
                                }
                            } else if (data.sql) {
                                fullSql += data.sql;
                                if (!assistantMessageDiv) {
                                    removeLoadingMessage(loadingId);
                                    assistantMessageDiv = addAssistantMessagePlaceholder();
                                }
                                updateAssistantMessage(assistantMessageDiv, fullSql);
                            } else if (data.error) {
                                throw new Error(data.error);
                            }
                        } catch (e) {
                            if (e instanceof SyntaxError) {
                                console.error('SSE JSON 解析失败:', trimmed);
                            } else {
                                console.error('解析错误:', e);
                                throw e;
                            }
                        }
                    }
                    if (done) break;
                }
            } catch (error) {
                removeLoadingMessage(loadingId);
                addMessage('assistant', `❌ 错误: ${error.message}`);
            } finally {
                sendBtn.disabled = false;
                input.disabled = false;
                input.focus();
            }
        }

        // 执行 SQL 并显示状态
        async function executeSqlWithStatus(id, sql) {
            const statusDiv = document.createElement('div');
            statusDiv.className = 'executing-status';
            statusDiv.innerHTML = '<span class="loading"></span> 正在执行查询...';

            const messagesDiv = document.getElementById('messages');
            messagesDiv.appendChild(statusDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const response = await fetch('/api/run_sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, sql })
                });
                const data = await response.json();

                statusDiv.remove();

                if (data.error) {
                    addMessage('assistant', `❌ SQL执行失败: ${data.error}`);
                    return;
                }

                // 显示结果区域
                const resultContainer = document.createElement('div');
                resultContainer.className = 'message assistant';

                let html = '<div class="message-content">';

                // 显示结果统计
                if (data.data && data.data.length > 0) {
                    html += `<div class="result-badge"><span class="icon">📊</span> 查询成功，共 ${data.row_count} 条记录</div>`;
                    html += displayDataHtml(data);
                } else {
                    html += '<div class="result-badge"><span class="icon">📭</span> 查询结果为空</div>';
                }

                html += '</div>';
                resultContainer.innerHTML = html;
                messagesDiv.appendChild(resultContainer);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;

                // 生成图表
                if (data.data && data.data.length > 0) {
                    await generatePlot(id);
                    await generateFollowup(id);
                }

            } catch (error) {
                statusDiv.remove();
                addMessage('assistant', `❌ 执行失败: ${error.message}`);
            }
        }

        // 生成表格 HTML
        function displayDataHtml(data) {
            if (!data.data || data.data.length === 0) return '<div>无数据</div>';

            const columns = data.columns;
            const rows = data.data;

            let html = '<div class="data-table"><table>';
            html += '<thead><tr>';
            columns.forEach(col => {
                html += `<th>${escapeHtml(col)}</th>`;
            });
            html += '</tr></thead><tbody>';

            rows.slice(0, 100).forEach(row => {
                html += '<tr>';
                columns.forEach(col => {
                    let value = row[col];
                    if (value === null || value === undefined) value = '';
                    html += `<td>${escapeHtml(String(value))}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table></div>';

            if (data.row_count > 100) {
                html += `<div style="font-size: 12px; color: #64748b; margin-top: 8px;">仅显示前100行，共 ${data.row_count} 行</div>`;
            }

            return html;
        }

        function displayData(data) {
            const html = displayDataHtml(data);
            addMessage('assistant', html, true);
        }

        async function generatePlot(id) {
            try {
                const response = await fetch('/api/generate_plot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                const data = await response.json();

                if (data.figure && !data.error) {
                    const figure = JSON.parse(data.figure);
                    const plotDiv = document.createElement('div');
                    plotDiv.className = 'plot-container';
                    Plotly.newPlot(plotDiv, figure.data, figure.layout);

                    const messagesDiv = document.getElementById('messages');
                    const wrapperDiv = document.createElement('div');
                    wrapperDiv.className = 'message assistant';
                    wrapperDiv.innerHTML = '<div class="message-content"></div>';
                    wrapperDiv.querySelector('.message-content').appendChild(plotDiv);
                    messagesDiv.appendChild(wrapperDiv);
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
            } catch (error) {
                console.error('生成图表失败:', error);
            }
        }

        async function generateFollowup(id) {
            try {
                const response = await fetch('/api/generate_followup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                const data = await response.json();

                if (data.questions && data.questions.length > 0) {
                    let html = '<div style="margin-top: 12px;"><strong>📌 您可以继续问：</strong></div><div class="followup-questions">';
                    data.questions.forEach(q => {
                        if (q && q.trim()) {
                            html += `<button class="followup-btn" onclick="askQuestion('${escapeHtml(q).replace(/'/g, "\\'")}')">${escapeHtml(q)}</button>`;
                        }
                    });
                    html += '</div>';
                    addMessage('assistant', html, true);
                }
            } catch (error) {
                console.error('生成后续问题失败:', error);
            }
        }

        function addMessage(role, content, isHtml = false) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (isHtml) {
                contentDiv.innerHTML = content;
            } else {
                contentDiv.textContent = content;
            }

            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            return messageDiv;
        }

        function addLoadingMessage() {
            const id = 'loading-' + Date.now();
            const messagesDiv = document.getElementById('messages');
            const loadingDiv = document.createElement('div');
            loadingDiv.id = id;
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = '<div class="message-content"><span class="loading"></span> 正在生成SQL...</div>';
            messagesDiv.appendChild(loadingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return id;
        }

        function removeLoadingMessage(id) {
            const element = document.getElementById(id);
            if (element) element.remove();
        }

        function addAssistantMessagePlaceholder() {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.innerHTML = '<div class="message-content"><div class="sql-block"></div></div>';
            messagesDiv.appendChild(messageDiv);
            return messageDiv;
        }

        function updateAssistantMessage(messageDiv, sql) {
            const sqlBlock = messageDiv.querySelector('.sql-block');
            if (sqlBlock) {
                sqlBlock.textContent = sql;
            }
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendQuestion();
            }
        }

        // 页面加载时加载训练数据
        loadTrainingData();
    </script>
</body>
</html>
